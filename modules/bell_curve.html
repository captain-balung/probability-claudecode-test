<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A · 鐘形曲線視覺化 — 機率賭場</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>A · 鐘形曲線視覺化</h1>
      <p>丟 N 枚硬幣，每一格代表「恰好 k 枚正面」的組合數 C(n, k)。組合數用 BigInt 精確計算，長條高度採對數縮放，才能在同一張圖呈現相差數十個數量級的鐘形分配。</p>
    </header>

    <section class="panel">
      <h2>參數設定</h2>
      <div class="controls">
        <div class="field">
          <label for="coins">硬幣數量 n（1–100）</label>
          <input type="number" id="coins" min="1" max="100" value="20" />
          <span class="hint">超過 20 枚自動啟用 dense-mode（隱藏細部標籤）</span>
        </div>
        <button class="btn btn-primary" id="drawBtn">繪製分配圖</button>
      </div>
      <div class="note" id="metaNote"></div>
    </section>

    <section class="panel">
      <h2>分配圖（長條高度為對數縮放）</h2>
      <div class="bell-chart" id="chart"></div>
    </section>
  </div>

  <footer class="site-footer">機率統計教學互動網站 · 賭場主題</footer>

  <script src="../js/main.js"></script>
  <script>
    (function () {
      var input = document.getElementById("coins");
      var chart = document.getElementById("chart");
      var meta = document.getElementById("metaNote");
      var btn = document.getElementById("drawBtn");

      function draw() {
        var n = parseInt(input.value, 10);
        if (isNaN(n) || n < 1) n = 1;
        if (n > 100) n = 100;
        input.value = n;

        // 計算所有 C(n,k)，k = 0..n
        var values = [];
        var max = 0n;
        var total = 0n; // 2^n
        for (var k = 0; k <= n; k++) {
          var c = App.combination(n, k);
          values.push(c);
          if (c > max) max = c;
          total += c;
        }

        // 對數縮放：高度 ∝ (log10(C)+1) / (log10(max)+1)
        var logMax = App.bigLog10(max) + 1;
        var dense = n > 20;
        chart.className = "bell-chart" + (dense ? " dense" : "");
        chart.innerHTML = "";

        for (var k2 = 0; k2 <= n; k2++) {
          var c2 = values[k2];
          var logV = c2 > 0n ? App.bigLog10(c2) + 1 : 0;
          var hPct = Math.max(2, (logV / logMax) * 100);

          var bar = document.createElement("div");
          bar.className = "bell-bar";
          bar.style.height = hPct + "%";

          // 機率 = C / 2^n（用浮點近似顯示百分比）
          var prob = Number(c2 * 1000000n / total) / 10000; // 百分比，小數兩位
          var tip = document.createElement("div");
          tip.className = "bar-tip";
          tip.innerHTML = "k=" + k2 + " 正面<br>組合數 " + App.formatBig(c2) +
                          "<br>機率 " + prob.toFixed(2) + "%";
          bar.appendChild(tip);

          if (!dense) {
            var lab = document.createElement("div");
            lab.className = "bar-k";
            lab.textContent = k2;
            bar.appendChild(lab);
          }
          chart.appendChild(bar);
        }

        meta.innerHTML =
          "n = <b>" + n + "</b> ｜ 總組合數 2<sup>" + n + "</sup> = <b>" +
          App.formatBig(total) + "</b> ｜ 中央峰值 C(" + n + ", " +
          Math.floor(n / 2) + ") = <b>" + App.formatBig(max) + "</b>" +
          (dense ? " ｜ <span class='badge'>dense-mode 已啟用</span>" : "");
      }

      btn.addEventListener("click", draw);
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") draw(); });
      draw();
    })();
  </script>
</body>
</html>
